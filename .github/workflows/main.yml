name: Build Nintendo DSi App
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    name: Build via devkitARM
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Camera Template
        run: |
          git clone https://github.com/Epicpkmn11/dsi-camera.git base_project
          # Overwrite their template's main.c with our video recorder app
          cp source/main.c base_project/arm9/source/main.c

      - name: Compile
        run: |
          cd base_project
          make
          cp dsi-camera.nds ../dsi_video_app.nds

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsi-video-app
          path: |
            *.nds
            *.ndsi
