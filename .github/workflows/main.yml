name: Build Nintendo DSi App

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    name: Build via devkitARM
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Makefile
        run: |
          # We use the standard DSi camera example Makefile which has the correct camera libs
          # If it doesn't exist, we fallback to the default arm9 template.
          if [ -f /opt/devkitpro/examples/nds/camera/camera_capture/Makefile ]; then
            cp /opt/devkitpro/examples/nds/camera/camera_capture/Makefile ./Makefile
          else
            cp /opt/devkitpro/examples/nds/templates/arm9/Makefile ./Makefile
          fi
          
          # Rename the target output
          sed -i 's/TARGET		:=	$(notdir $(CURDIR))/TARGET := dsi_video_app/' Makefile || true

      - name: Auto-fix camera header
        run: |
          # Find which header declares cameraInit
          HEADER=$(grep -rl "cameraInit" /opt/devkitpro/libnds/include/ | grep "\.h$" | head -n 1)
          if [ -n "$HEADER" ]; then
            REL_PATH=$(echo "$HEADER" | sed 's|/opt/devkitpro/libnds/include/||')
            echo "Found cameraInit in: $REL_PATH"
            sed -i "s|nds/arm9/camera.h|$REL_PATH|g" source/main.c
          else
            echo "cameraInit not found in any standard header!"
          fi

      - name: Compile
        run: make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsi-video-app
          path: |
            *.nds
            *.ndsi
