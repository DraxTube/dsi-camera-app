name: Build DSi Video Cam

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compila con devkitPro
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20240202
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/devkitARM/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa nds-dev
        run: |
          dkp-pacman -Rdd --noconfirm libfilesystem 2>/dev/null || true
          dkp-pacman -Sy --noconfirm --needed \
            devkitARM libnds default-arm7 ndstool \
            dswifi libfat-nds maxmod-nds grit mmutil

      - name: Compila
        run: |
          arm-none-eabi-gcc --version
          make

      - name: Upload .nds
        uses: actions/upload-artifact@v4
        with:
          name: dsi-video-cam
          path: dsi-video-cam.nds
          if-no-files-found: error

      - name: Crea Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dsi-video-cam.nds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
