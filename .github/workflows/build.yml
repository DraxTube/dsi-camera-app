name: Build DSi Video Cam

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compila con devkitPro
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del codice
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installa devkitPro e nds-dev
      - name: Installa devkitPro
        run: |
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x ./install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          sudo dkp-pacman -Sy --noconfirm nds-dev

      # 3. Compila
      - name: make
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          arm-none-eabi-gcc --version
          make

      # 4. Carica il .nds come artifact scaricabile da GitHub
      - name: Upload .nds
        uses: actions/upload-artifact@v4
        with:
          name: dsi-video-cam
          path: dsi-video-cam.nds
          if-no-files-found: error

      # 5. Crea Release automatica quando pushy un tag vX.Y.Z
      - name: Crea Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dsi-video-cam.nds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
