name: Build DSi Video Cam

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compila con devkitPro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installa devkitPro tramite repository APT ufficiale
      - name: Installa devkitPro
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget https://apt.devkitpro.org/devkitpro-pacman.amd64.deb
          sudo apt install -y ./devkitpro-pacman.amd64.deb
          sudo dkp-pacman -Sy --noconfirm nds-dev

      - name: Compila
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
          arm-none-eabi-gcc --version
          make

      - name: Upload .nds
        uses: actions/upload-artifact@v4
        with:
          name: dsi-video-cam
          path: dsi-video-cam.nds
          if-no-files-found: error

      - name: Crea Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dsi-video-cam.nds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
