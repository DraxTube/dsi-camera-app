name: Build DSi Video Cam

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # permette avvio manuale dalla UI di GitHub

jobs:
  build:
    name: Compila con devkitPro
    runs-on: ubuntu-latest

    container:
      # Immagine ufficiale devkitPro con tutto il toolchain ARM già installato
      image: devkitpro/devkitarm:latest

    steps:
      # 1. Checkout del codice
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Mostra versione toolchain (utile per debug)
      - name: Info toolchain
        run: |
          arm-none-eabi-gcc --version
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"

      # 3. Compila
      - name: make
        run: make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITARM: /opt/devkitpro/devkitARM
          PATH: /opt/devkitpro/devkitARM/bin:/opt/devkitpro/tools/bin:$PATH

      # 4. Carica il .nds come artifact scaricabile da GitHub
      - name: Upload .nds
        uses: actions/upload-artifact@v4
        with:
          name: dsi-video-cam
          path: dsi-video-cam.nds
          if-no-files-found: error

      # 5. (Opzionale) Crea una Release automatica quando pushy un tag vX.Y.Z
      - name: Crea Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dsi-video-cam.nds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
